# Policy del Safety Supervisor (vedi DECISIONS.md, "Safety Supervisor: punto
# unico di autorizzazione per ogni tool call"). Valutate in ordine di
# priorita' crescente, vince il primo match. Nessuna regola di perimetro
# filesystem qui: non esiste ancora nulla che produca "path_in_perimetro"
# nel contesto (arriva con Agente Locale, Ciclo B) - aggiungerla ora sarebbe
# speculativa.

policies:
  - name: "Azioni immediate, basso rischio"
    priority: 10
    category: immediata
    response: allow

  - name: "Azioni distruttive"
    priority: 20
    category: distruttiva
    response: ask_user
    message: "Azione: {tool_name}. Confermi?"

  - name: "Default deny"
    priority: 1000
    response: deny
    message: "Azione non autorizzata: nessuna policy applicabile."
